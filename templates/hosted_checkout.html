<!doctype html>
<html lang="en">
<head>

  <title>Hosted Checkout - PayNow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 to-indigo-50 text-slate-900">
